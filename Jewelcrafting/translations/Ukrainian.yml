jc_reaper_sword: "Небесний кістяний меч"
jc_reaper_sword_description: "Меч, зроблений з кісток, благословенний самим небом. Ця зброя завдає {power}% бонусної шкоди світовим босам."
jc_reaper_bow: "Небесний кістяний лук"
jc_reaper_bow_description: "Лук, зроблений з кісток, благословенний самим небом. Випускає два снаряди одночасно. Ця зброя завдає {power}% бонусної шкоди світовим босам."
