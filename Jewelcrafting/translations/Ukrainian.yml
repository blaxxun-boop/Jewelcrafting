jc_effect_fleetinglife: "Плинне життя"
jc_effect_fleetinglife_desc: "Шанс зцілити найбільш пораненого учасника групи при атаці."
jc_effect_fleetinglife_desc_detail: "$1% шанс зцілити найбільш пораненого учасника групи поблизу при атаці. Зцілення збільшується до 300%, чим ближче ціль до вас."
jc_effect_archerymentor: "Наставник лучників"
jc_effect_archerymentor_desc: "Збільшує навичку лука учасників групи, якщо вона нижча за вашу."
jc_effect_archerymentor_desc_detail: "Рівень навички лука учасників групи поблизу збільшується на $1% від різниці між вашими рівнями навичок, якщо ваш рівень вищий за їхній."
jc_effect_arbalistmentor: "Наставник арбалетників"
jc_effect_arbalistmentor_desc: "Збільшує навичку арбалета учасників групи, якщо вона нижча за вашу."
jc_effect_arbalistmentor_desc_detail: "Рівень навички арбалета учасників групи поблизу збільшується на $1% від різниці між вашими рівнями навичок, якщо ваш рівень вищий за їхній."
jc_effect_cowardice: "Боягузтво"
jc_effect_cowardice_desc: "Збільшує вашу швидкість руху, якщо ви отримуєте шкоду, перебуваючи в групі."
jc_effect_cowardice_desc_detail: "$1% збільшена швидкість руху на $2 секунд, якщо ви отримуєте шкоду, коли учасник групи поблизу. Накладається до $3 разів."
jc_se_cowardice: "Боягуз"
jc_se_cowardice_description: "Ви боягуз і готові втекти."
jc_effect_togetherforever: "Разом назавжди"
jc_effect_togetherforever_desc: "Надає бафи вам і учаснику групи поблизу кожні кілька секунд. Накладає дебафи на вас, якщо ви самі, перебуваючи в групі."
jc_effect_togetherforever_desc_detail: "Якщо учасник групи поблизу, швидкість руху буде збільшена на $1%, швидкість атаки буде збільшена на $5%, а завдана шкода буде збільшена на $6% на $4 секунд кожні $2-$3 секунд для вас обох. Якщо немає учасника групи в межах 30 метрів, ваша швидкість руху буде зменшена на $7%, а отримана шкода буде збільшена на $8%. Не має ефекту, якщо немає учасника групи в межах 100 метрів."
jc_effect_no_effect: "Немає ефекту"
jc_effect_disabled_other_utility_item_equipped: "Неактивно: Інша утиліта екіпірована"
jc_socket_compendium: "Ефекти сокетів"
jc_socket_compendium_description: "Це загальний огляд усіх існуючих самоцвітів. Для детального опису ваших екіпірованих самоцвітів, будь ласка, перегляньте вкладку активних ефектів."
jc_gem_effects_compendium: "Активні сокети"
jc_boss_crystal_1: "Корінь Старійшини"
jc_boss_crystal_1_description: "Самоцвіт, який містить сам корінь Старійшини."
jc_boss_crystal_1_description_flavor: |
  "Жодне дерево, кажуть, не може вирости до неба, якщо його коріння не сягає пекла."
jc_boss_crystal_2: "Отрута Кістяної Маси"
jc_boss_crystal_2_description: "Самоцвіт, який містить саму отруту Кістяної Маси."
jc_boss_crystal_2_description_flavor: |
  "Є отрути, які засліплюють вас, і отрути, які відкривають вам очі."
jc_boss_crystal_3: "Магія Королеви"
jc_boss_crystal_3_description: "Самоцвіт, який містить саму магію Королеви."
jc_boss_crystal_3_description_flavor: |
  "І понад усе, спостерігайте блискучими очима за всім світом навколо вас, тому що найбільші таємниці завжди приховані в найнеправдоподібніших місцях. Ті, хто не вірить у магію, ніколи її не знайдуть."
jc_boss_crystal_4: "Лід Модер"
jc_boss_crystal_4_description: "Самоцвіт, який містить сам лід Модер."
jc_boss_crystal_4_description_flavor: |
  "Дехто каже, що світ загине у вогні,
  Дехто каже, що в льоду.
  З того, що я скуштував бажання,
  Я підтримую тих, хто віддає перевагу вогню.
  Але якщо йому доведеться загинути двічі,
  Я думаю, що знаю достатньо про ненависть,
  Щоб сказати, що для руйнування лід
  Також чудовий
  І був би достатнім."
jc_boss_crystal_5: "Вогонь Яґлута"
jc_boss_crystal_5_description: "Самоцвіт, який містить сам вогонь Яґлута."
jc_boss_crystal_5_description_flavor: |
  "З попелу прокинеться вогонь,
  Світло з тіней вирине;
  Відновиться лезо, що було зламане,
  Безкороний знову стане королем."
jc_boss_crystal_7: "Блискавка Ейктура"
jc_boss_crystal_7_description: "Самоцвіт, який містить саму блискавку Ейктура."
jc_boss_crystal_7_description_flavor: |
  "Грім — це добре, грім вражає; але саме блискавка робить роботу."
jc_boss_crystal_8: "Попіл Фадера"
jc_boss_crystal_8_description: "Самоцвіт, який містить сам попіл Фадера."
jc_boss_crystal_8_description_flavor: |
  "Щоб піднятися
  З власного попелу
  Фенікс
  Спочатку
  Повинен
  Згоріти."
jc_friendship_group_gem: "Сила дружби"
jc_friendship_group_gem_description: "Самоцвіт, який містить саму Силу дружби."
jc_friendship_group_gem_description_flavor: |
  "Я б краще йшов з другом у темряві, ніж самотньо у світлі."
jc_se_start_group_friendship: "Наближається дружба"
jc_se_start_group_friendship_description: "Ви ось-ось відчуєте справжню дружбу або розбите серце."
jc_se_group_friendship: "Сила дружби"
jc_se_group_friendship_description: "Швидкість руху збільшена на $1%, швидкість атаки збільшена на $2%, а завдана шкода збільшена на $3%."
jc_se_group_loneliness: "Самотній"
jc_se_group_loneliness_description: "Швидкість руху зменшена на $7%, а отримана шкода збільшена на $8%."
