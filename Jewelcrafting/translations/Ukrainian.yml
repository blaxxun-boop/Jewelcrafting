jc_necklace_red: "Рубінове намисто усвідомлення"
jc_necklace_red_description: "Носіння цього красивого рубінового намиста підвищує вашу сприйнятливість, роблячи вас обізнаним про ворогів, які намагаються підкрастися до вас."
jc_se_necklace_red: "Обізнаний"
jc_se_necklace_red_description: "Ви обізнані про своє оточення. Ніхто не може підкрастися до вас."
jc_ring_purple: "Міцне шпінелеве кільце"
jc_ring_purple_description: "Це кільце здається неймовірно міцним і, ймовірно, не зламається, якщо ви спробуєте додати до нього сокети. Однак воно також жорстке і ускладнює бій, зменшуючи вашу завдану шкоду на {power}%."
jc_se_ring_purple: "Жорсткий палець"
jc_se_ring_purple_description: "Ваше кільце заважає вам рухати одним із пальців, зменшуючи вашу завдану шкоду на {power}%."
jc_ring_green: "Смарагдове кільце мисливця за головами"
jc_ring_green_description: "Кільце, створене для мисливців за головами. Якщо ви вперше вдарите боса, носячи це кільце, ваша шкода збільшується на {power}% на {duration} секунд."
jc_se_ring_green: "Мисливець за головами"
jc_se_ring_green_description: "Ваша завдана шкода збільшена на {power}%."
jc_ring_red: "Рубінове кільце тепла"
jc_ring_red_description: "Це кільце випромінює тепло, змушуючи носія почуватися теплим. Це запобігає відчуттю холоду вночі та збільшує регенерацію витривалості на {regen}% вночі."
jc_se_ring_red: "Теплий"
jc_se_ring_red_description: "Ви не відчуваєте холоду, і ваша регенерація витривалості збільшена на {regen}%. Активно лише вночі."
jc_necklace_green: "Смарагдове намисто магічного ремонту"
jc_necklace_green_description: "Смарагдове намисто, яке випромінює магічну ауру. Ця аура повільно ремонтує все екіпірування, яке ви носите."
jc_se_necklace_green: "Магічний ремонт"
jc_se_necklace_green_description: "Екіпірування, яке ви носите, повільно ремонтується."
jc_necklace_blue: "Водне сапфірове намисто"
jc_necklace_blue_description: "Це блискуче намисто містить сапфір, який містить невелику кількість чистої води. Носіння цього намиста збільшить вашу завдану шкоду, коли ви мокрі."
jc_se_necklace_blue: "Водний"
jc_se_necklace_blue_description: "Ваша завдана шкода збільшена на {power}%."
jc_ring_blue: "Кільце сапфірового благословення Модер"
jc_ring_blue_description: "Кільце з сапфіром, яке було благословлене самою Модер. Носячи це кільце, ви будете благословенні Модер на {duration} секунд кожні {cooldown} секунд."
jc_se_ring_blue: "Благословення Модер"
jc_se_ring_blue_description: "Ви будете благословенні Модер на {duration} секунд кожні {cooldown} секунд."
jc_necklace_yellow: "Сірчане намисто лісоруба"
jc_necklace_yellow_description: "Носіння цього делікатного намиста робить вашу сокиру інструментом, а не зброєю. Це дозволяє використовувати ефекти самоцвітів, які впливають на інструменти, у вашій сокирі, але шкода, яку ваша сокира завдає створінням, значно зменшується."
jc_se_necklace_yellow: "Лісорубство"
jc_se_necklace_yellow_description: "Ваша сокира вважається інструментом, а не зброєю. Вона завдає значно меншої шкоди створінням."
jc_necklace_purple: "Шпінелеве намисто проводу"
jc_necklace_purple_description: "Магія всередині цього намиста проведе вас до невимовних скарбів ... або смерті. Дотримуйтесь його проводу, але ніколи не втрачайте пильності. Корисно лише якщо ви не можете читати свою карту."
jc_se_necklace_purple: "Провід"
jc_se_necklace_purple_description: "Ваше намисто проводить вас до рідкісних скарбів. Чи наважуєтеся ви слухати його?"
jc_necklace_orange: "Гумітове намисто налаштування на самоцвіти"
jc_necklace_orange_description: "Це особливе намисто резонує з самоцвітними формаціями поблизу, відкриваючи їх на вашій карті. Дальність цього залежить від рівня ювелірного ремесла майстра."
jc_se_necklace_orange: "Налаштування"
jc_se_necklace_orange_description: "Ваше намисто резонує з самоцвітними формаціями в межах $1м, відкриваючи їх на вашій карті."
jc_ring_black: "Кільце Оніксової спадщини"
jc_ring_black_description: "Кільце, що є частиною спадщини цього світу і проведе вас до скарбів. Корисно лише якщо ви не можете читати свою карту."
jc_se_ring_black: "Спадщина"
jc_se_ring_black_description: "Ваше кільце проводить вас до рідкісних скарбів. Чи наважуєтеся ви слухати його?"
jc_gacha_coins: "Небесні монети"
jc_gacha_coins_description: "Деякі блискучі монети, які виконують бажання з самого неба."
jc_right_text_details: "Синергії можуть бути активовані шляхом вставлення певних комбінацій самоцвітів. Вони враховують ваші екіпіровані самоцвіти на всіх предметах, включаючи вашу зброю. Тому не забудьте екіпірувати свою зброю, коли прагнете до синергії. Активні синергії виділені. Кількість активних синергій також відображається у вашому інвентарі."
jc_possible_synergies: "Список можливих синергій:"
jc_effect_pyromaniac: "Піроман"
jc_effect_pyromaniac_desc: "Шанс активації Вогнезапалювача збільшено."
jc_effect_pyromaniac_desc_detail: "Вогнезапалювач має на $1% більший шанс активуватися."
jc_synergy_condition_at_least_six_red_and_no_blue: "Мати принаймні шість червоних самоцвітів, але жодного синього"
jc_effect_resonatingechoes: "Резонуючі відлуння"
jc_effect_resonatingechoes_desc: "Шанс активації Еха збільшено."
jc_effect_resonatingechoes_desc_detail: "Ехо має на $1% більший шанс активуватися."
jc_synergy_condition_exactly_three_yellow: "Мати рівно три жовтих самоцвіти"
jc_effect_equilibrium: "Рівновага"
jc_effect_equilibrium_desc: "Збільшує завдану шкоду та зменшує отриману шкоду."
jc_effect_equilibrium_desc_detail: "Завдана шкода збільшена на $1%, а отримана шкода зменшена на $1%."
jc_synergy_condition_same_number_of_all_colors: "Мати рівно однакову кількість самоцвітів усіх кольорів"
jc_effect_neveralone: "Ніколи не самотній"
jc_effect_neveralone_desc: "Ефекти дебафу самотності зменшено."
jc_effect_neveralone_desc_detail: "Негативні ефекти дебафу самотності зменшено на $1%."
