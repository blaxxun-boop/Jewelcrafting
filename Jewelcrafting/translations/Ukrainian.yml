jc_effect_eternalstudent: "Вічний учень"
jc_effect_eternalstudent_desc: "Збільшує рівень навичок, отриманих від самоцвітів."
jc_effect_eternalstudent_desc_detail: "Самоцвіти, які підвищують рівень навички, на $1% ефективніші."
jc_synergy_condition_more_red_than_black_and_purple_combined: "Більше червоних, ніж чорних і фіолетових самоцвітів разом, але принаймні по два з кожного"
jc_effect_timewarp: "Викривлення часу"
jc_effect_timewarp_desc: "Зменшує перезарядку самоцвітів босів."
jc_effect_timewarp_desc_detail: "Перезарядка самоцвітів босів зменшена на $1%."
jc_synergy_condition_same_number_of_green_and_blue: "Мати однакову кількість зелених і синіх самоцвітів, але принаймні по два з кожного"
jc_effect_carefulcutting: "Обережне різання"
jc_effect_carefulcutting_desc: "Зменшує шанс зламати самоцвіти при обробці."
jc_effect_carefulcutting_desc_detail: "$1% додатковий шанс успішно обробити самоцвіт."
